<style>
  .material-symbols-outlined {
    font-variation-settings:
    'FILL' 0,
    'wght' 400,
    'GRAD' 0,
    'opsz' 24

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-[#121212] text-white min-h-screen flex flex-col font-body-primary antialiased">
<!-- Active Workout Wrapper - Kept thin for optimal mobile-first display -->
<main class="w-full max-w-md mx-auto min-h-screen flex flex-col bg-[#121212] relative shadow-2xl shadow-black/50 sm:border-x border-border-dark">
<!-- Top Bar (Contextual Header - Replaces global Nav due to transactional state) -->
<header class="flex justify-between items-center px-container-margin py-stack-gap-sm sticky top-0 z-20 bg-[#121212]/90 backdrop-blur-md">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-[#1E1E1E] text-white hover:bg-border-dark transition-colors">
<span class="material-symbols-outlined">pause</span>
</button>
<div class="flex flex-col items-center">
<span class="font-subheadline text-subheadline text-white">Exercise 2/6</span>
<span class="font-label-caps text-label-caps text-outline-variant mt-0.5">12:34 / 60:00</span>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-[#1E1E1E] text-white hover:bg-border-dark transition-colors">
<span class="material-symbols-outlined">volume_up</span>
</button>
</header>
<!-- Video Placeholder Canvas -->
<div class="px-container-margin mt-stack-gap-sm">
<div class="w-full aspect-video bg-[#1E1E1E] rounded-xl overflow-hidden relative shadow-sm border border-border-dark">
<!-- Generative image prompt as requested via data-alt -->
<img alt="Wide Push-up demonstration" class="w-full h-full object-cover opacity-90 mix-blend-screen" data-alt="A cinematic, high-quality photograph of an athletic person demonstrating a wide push-up form in a modern, brightly lit fitness studio. The environment features a minimalist light-mode aesthetic with clean white walls, light wood flooring, and soft natural sunlight casting dynamic shadows to emphasize depth. The mood is energetic, focused, and professional, perfectly aligning with a premium fitness tracking app interface. Subtle warm orange and terracotta accents in the workout gear highlight the brand's specific 'Push' color scheme, maintaining cohesion with the UI theme." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBK5ZjCV1u_kLb42xDdP8QBwI15aQ4xFYLDdE3a68OOwUU8fLMqequ35uUYOVNN65wSC_5g4TVS8ElABmMzNiS0u98XNhR-DZ2lgOFhnZNclQKThxfF049lcBIxGkRWa-J8xh-unCn1EDacJnTlTnWM7NHjmo4xP3iQRqacNlCO25VlSv37CXnj6UM-XtGnc3PwSLMQ0ogg5QFcBnsJULJfmiGxR-Zl1rDemv8maR14GbHc4nZe6TaT5_wBWUAaoIXRKRJ3h5y7uLg"/>
<!-- Play Overlay -->
<button class="absolute inset-0 m-auto w-14 h-14 bg-black/50 rounded-full flex items-center justify-center backdrop-blur-sm text-white shadow-lg hover:scale-105 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1; font-size: 32px;">play_arrow</span>
</button>
</div>
</div>
<!-- Central Exercise Info -->
<div class="flex flex-col items-center mt-stack-gap-lg px-container-margin text-center">
<h1 class="font-headline-main text-headline-main text-white">Wide Push-ups</h1>
<p class="font-body-secondary text-body-secondary text-outline-variant mt-1">2 sec descent, explode up</p>
<!-- Set Info Pill -->
<div class="flex items-center gap-3 mt-stack-gap-md bg-[#1E1E1E] py-2 px-5 rounded-full border border-border-dark shadow-sm">
<span class="font-label-caps text-label-caps text-white tracking-widest">SET 2 OF 4</span>
<div class="flex gap-1.5 items-center">
<div class="w-2.5 h-2.5 rounded-full bg-push-accent-dark shadow-sm"></div>
<div class="w-2.5 h-2.5 rounded-full bg-push-accent-dark shadow-sm ring-2 ring-push-accent-dark ring-offset-2 ring-offset-[#1E1E1E]"></div>
<div class="w-2 h-2 rounded-full bg-outline opacity-50"></div>
<div class="w-2 h-2 rounded-full bg-outline opacity-50"></div>
</div>
</div>
<span class="font-subheadline text-subheadline text-push-accent-dark mt-3">10-12 reps</span>
</div>
<!-- HUD Timer Ring (Focus of the screen) -->
<div class="flex-1 flex items-center justify-center relative mt-stack-gap-md mb-stack-gap-lg">
<div class="relative flex items-center justify-center w-64 h-64">
<!-- SVG Ring -->
<svg class="w-full h-full -rotate-90 transform drop-shadow-sm" viewbox="0 0 100 100">
<!-- Background track -->
<circle class="text-[#1E1E1E]" cx="50" cy="50" fill="transparent" r="46" stroke="currentColor" stroke-width="2.5"></circle>
<!-- Active progress (simulating 50% for 1:30 out of 3:00) -->
<circle class="text-push-accent-dark transition-all duration-1000 ease-linear" cx="50" cy="50" fill="transparent" r="46" stroke="currentColor" stroke-dasharray="289" stroke-dashoffset="144" stroke-linecap="round" stroke-width="4"></circle>
</svg>
<!-- Timer Text Inside -->
<div class="absolute inset-0 flex flex-col items-center justify-center">
<span class="font-timer-display text-timer-display text-white tabular-nums tracking-tighter">1:30</span>
<span class="font-label-caps text-label-caps text-push-accent-dark mt-1 bg-push-accent-dark/20 px-2 py-0.5 rounded text-[10px]">RESTING</span>
</div>
</div>
</div>
<!-- Bottom Controls (Action Area) -->
<div class="mt-auto p-container-margin pb-timer-safe-area flex flex-col gap-stack-gap-sm bg-gradient-to-t from-[#121212] via-[#121212] to-transparent pt-stack-gap-lg">
<button class="w-full py-4 bg-push-accent-dark text-white rounded-xl font-subheadline text-subheadline flex items-center justify-center gap-2 hover:bg-push-accent transition-colors shadow-lg shadow-push-accent-dark/20 active:scale-[0.98]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
        Mark Set Done
      </button>
<button class="w-full py-3.5 bg-transparent border-[1.5px] border-push-accent-dark/40 text-push-accent-dark rounded-xl font-subheadline text-subheadline hover:bg-push-accent-dark/10 transition-colors active:scale-[0.98]">
        Skip Rest
      </button>
</div>
</main>
</body></html>
