<style>
        /* Base styles mapped to tokens to ensure correct font family rendering */
        body {
            font-family: 'Lexend', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom input reset to maintain pure minimal design */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-primary-container h-screen w-full flex flex-col font-body-primary overflow-hidden">
<!-- Top Navigation / Progress Indicator -->
<header class="w-full px-container-margin pt-12 pb-stack-gap-lg flex flex-col gap-stack-gap-md max-w-md mx-auto">
<div class="flex items-center justify-between">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full text-inverse-primary hover:bg-inverse-surface transition-colors focus:outline-none focus:ring-2 focus:ring-push-accent">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<span class="font-label-caps text-label-caps text-inverse-primary tracking-widest">STEP 1 OF 3</span>
<div class="w-10 h-10"></div> <!-- Spacer to center the label perfectly -->
</div>
<!-- Minimal Progress Bar -->
<div aria-valuemax="100" aria-valuemin="0" aria-valuenow="33" class="h-1 w-full bg-inverse-surface rounded-full overflow-hidden" role="progressbar">
<div class="h-full bg-legs-accent w-1/3 rounded-full"></div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center justify-center px-container-margin w-full max-w-md mx-auto gap-12">
<!-- Section Header -->
<div class="text-center flex flex-col gap-stack-gap-sm">
<h1 class="font-headline-main text-headline-main text-on-secondary">Your Biometrics</h1>
<p class="font-body-secondary text-body-secondary text-inverse-primary">Let's set your baseline to calibrate your targets.</p>
</div>
<!-- Inputs Container (Bento/Minimalist approach) -->
<div class="w-full flex flex-col gap-stack-gap-lg">
<!-- Weight Input Group -->
<div class="bg-bg-secondary-dark rounded-xl p-6 flex flex-col items-center border border-border-dark relative group focus-within:border-push-accent transition-colors">
<label class="font-label-caps text-label-caps text-on-primary-container tracking-widest mb-2" for="weight-input">WEIGHT</label>
<div class="flex items-baseline justify-center">
<input class="bg-transparent border-none text-center font-timer-display text-timer-display text-on-secondary focus:ring-0 p-0 w-32 outline-none" id="weight-input" type="number" value="62"/>
<span class="font-subheadline text-subheadline text-on-primary-container ml-1">kg</span>
</div>
</div>
<!-- Height Input Group -->
<div class="bg-bg-secondary-dark rounded-xl p-6 flex flex-col items-center border border-border-dark relative group focus-within:border-push-accent transition-colors">
<label class="font-label-caps text-label-caps text-on-primary-container tracking-widest mb-2" for="height-input">HEIGHT</label>
<div class="flex items-baseline justify-center">
<input class="bg-transparent border-none text-center font-timer-display text-timer-display text-on-secondary focus:ring-0 p-0 w-32 outline-none" id="height-input" type="number" value="170"/>
<span class="font-subheadline text-subheadline text-on-primary-container ml-1">cm</span>
</div>
</div>
</div>
</main>
<!-- Bottom Action Area -->
<footer class="w-full px-container-margin pb-timer-safe-area pt-stack-gap-md max-w-md mx-auto mt-auto">
<button class="w-full bg-push-accent text-on-primary font-subheadline text-subheadline py-4 rounded-xl flex justify-center items-center gap-2 hover:opacity-90 active:scale-[0.98] transition-all shadow-lg focus:outline-none focus:ring-4 focus:ring-push-accent focus:ring-opacity-50">
            Continue
            <span class="material-symbols-outlined" style="font-variation-settings: 'wght' 600;">arrow_forward</span>
</button>
</footer>
</body></html>
