<!DOCTYPE html>

                      "surface-dim": "#ddd9d9",

<style>
        .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-primary text-on-primary min-h-screen flex flex-col font-body-primary">
<!-- Celebration Header / Confetti Area -->
<div class="relative w-full h-48 sm:h-64 flex items-center justify-center overflow-hidden bg-gradient-to-b from-push-accent/20 to-primary">
<div class="absolute inset-0 opacity-50 bg-[url('https://images.unsplash.com/photo-1514525253161-7a46d19cd819?ixlib=rb-4.0.3&amp;auto=format&amp;fit=crop&amp;w=1920&amp;q=80')] bg-cover bg-center" data-alt="A dark, modern abstract background with subtle glowing particle effects resembling confetti. The lighting is focused and energetic, with warm, motivational accents against a deep, sleek dark mode canvas. The texture is smooth and digital, creating a sense of celebration without cluttering the screen. Minimalist, high-performance fitness aesthetic." style="mix-blend-mode: overlay;"></div>
<div class="z-10 text-center px-container-margin pt-timer-safe-area">
<span class="material-symbols-outlined text-success-dark text-6xl mb-stack-gap-sm block mx-auto" style="font-variation-settings: 'FILL' 1;">stars</span>
<h1 class="font-timer-display text-timer-display text-on-primary">Day 14</h1>
<p class="font-headline-main text-headline-main text-push-accent mt-2">Complete! 🎉</p>
</div>
</div>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-start px-container-margin py-stack-gap-lg max-w-2xl mx-auto w-full">
<!-- Stats Bento Grid -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-stack-gap-md w-full mb-stack-gap-lg">
<!-- Stat Card 1 -->
<div class="bg-bg-secondary-dark border border-border-dark rounded-xl p-stack-gap-md flex flex-col items-center justify-center">
<span class="material-symbols-outlined text-outline-variant mb-2">timer</span>
<span class="font-label-caps text-label-caps text-outline-variant uppercase">Total Time</span>
<span class="font-subheadline text-subheadline text-on-primary mt-1">60:00</span>
</div>
<!-- Stat Card 2 -->
<div class="bg-bg-secondary-dark border border-border-dark rounded-xl p-stack-gap-md flex flex-col items-center justify-center">
<span class="material-symbols-outlined text-outline-variant mb-2">fitness_center</span>
<span class="font-label-caps text-label-caps text-outline-variant uppercase">Volume</span>
<span class="font-subheadline text-subheadline text-on-primary mt-1">24 Sets</span>
</div>
<!-- Stat Card 3 -->
<div class="bg-bg-secondary-dark border border-border-dark rounded-xl p-stack-gap-md flex flex-col items-center justify-center">
<span class="material-symbols-outlined text-outline-variant mb-2">local_fire_department</span>
<span class="font-label-caps text-label-caps text-outline-variant uppercase">Cals Burned</span>
<span class="font-subheadline text-subheadline text-on-primary mt-1">450</span>
</div>
</div>
<!-- Motivational Message -->
<div class="bg-surface-tint/10 border border-push-accent/30 rounded-xl p-stack-gap-lg w-full text-center mb-timer-safe-area">
<p class="font-body-primary text-body-primary text-secondary-fixed-dim">
                You're <span class="font-subheadline text-subheadline text-push-accent">23%</span> through your 60-day journey.
            </p>
<p class="font-subheadline text-subheadline text-on-primary mt-2">Keep the momentum!</p>
</div>
<!-- Action Buttons -->
<div class="w-full flex flex-col gap-stack-gap-sm mt-auto">
<button class="w-full bg-push-accent text-on-primary font-subheadline text-subheadline py-4 rounded-xl flex items-center justify-center gap-2 hover:bg-push-accent-dark transition-colors">
<span class="material-symbols-outlined">home</span>
                Back to Home
            </button>
<button class="w-full bg-transparent border-[1.5px] border-border-dark text-on-primary font-subheadline text-subheadline py-4 rounded-xl flex items-center justify-center gap-2 hover:bg-bg-secondary-dark transition-colors">
<span class="material-symbols-outlined">visibility</span>
                Preview Tomorrow (Pull Day)
            </button>
</div>
</main>
</body></html>
